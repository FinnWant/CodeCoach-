<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img">
<title>CodeCoach++ icon</title>
<desc>App icon featuring stacked code brackets in orange tones with a graduation cap accent.</desc>

<!-- Rounded square background -->
<rect x="0" y="0" width="512" height="512" rx="96" fill="#7c2d12"/>

<!-- Subtle inner glow ring -->
<rect x="8" y="8" width="496" height="496" rx="90" fill="none" stroke="#ea580c" stroke-width="1" opacity="0.3"/>

<!-- Logo mark: stacked brackets representing layered/shared projects -->
<g transform="translate(106, 130)">

<!-- Back layer bracket pair (faded - older projects) -->
<g opacity="0.35">
<path d="M 50 30 L 20 30 L 20 220 L 50 220" fill="none" stroke="#fb923c" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 250 30 L 280 30 L 280 220 L 250 220" fill="none" stroke="#fb923c" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</g>

<!-- Middle layer bracket pair -->
<g opacity="0.65" transform="translate(0, 15)">
<path d="M 50 30 L 20 30 L 20 220 L 50 220" fill="none" stroke="#f97316" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 250 30 L 280 30 L 280 220 L 250 220" fill="none" stroke="#f97316" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
</g>

<!-- Front layer bracket pair (vivid - active project) -->
<g transform="translate(0, 30)">
<path d="M 50 30 L 20 30 L 20 220 L 50 220" fill="none" stroke="#fdba74" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M 250 30 L 280 30 L 280 220 L 250 220" fill="none" stroke="#fdba74" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Graduation cap inside front brackets -->
<g transform="translate(150, 125)">
<!-- cap board -->
<polygon points="-58,0 0,-22 58,0 0,22" fill="#fef3c7"/>
<!-- cap base -->
<path d="M -32 11 L -32 32 Q 0 46 32 32 L 32 11" fill="none" stroke="#fef3c7" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<!-- tassel -->
<line x1="40" y1="4" x2="50" y2="36" stroke="#fef3c7" stroke-width="4.5" stroke-linecap="round"/>
<circle cx="50" cy="40" r="5.5" fill="#fef3c7"/>
</g>
</g>
</g>

<!-- ++ accent in bottom right -->
<text x="395" y="445" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="72" font-weight="700" fill="#fed7aa" letter-spacing="-2">++</text>

</svg>
